name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -race ./...

      - name: Integration tests
        run: go test -race -tags integration ./...

      - name: Build CLI
        run: go build -o bin/fluvio ./cmd/fluvio
