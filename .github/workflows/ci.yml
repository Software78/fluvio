name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        id: unit
        run: go test -race -coverprofile=unit.out -covermode=atomic ./...

      - name: Integration tests
        run: go test -race -tags integration -coverprofile=integration.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        if: always() && steps.unit.outcome != 'skipped'
        uses: codecov/codecov-action@v5
        with:
          files: unit.out,integration.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build CLI
        run: go build -o bin/fluvio ./cmd/fluvio
